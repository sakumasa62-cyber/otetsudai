<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧹 おてつだいアプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
/* === Reset & Base === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'M PLUS Rounded 1c', 'Hiragino Maru Gothic Pro', sans-serif;
  background: var(--c-bg);
  color: var(--c-text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* === CSS Variables === */
:root {
  --c-bg: #fff9f5;
  --c-text: #3d3020;
  --c-muted: #9e8e7e;
  --c-border: #f0e4d4;
  --c-white: #ffffff;
  --radius: 18px;
  --radius-sm: 10px;
  --shadow: 0 4px 16px rgba(0,0,0,0.10);
  --shadow-deep: 0 8px 24px rgba(0,0,0,0.15);

  --c-yuuna-primary: #ff6baa;
  --c-yuuna-light: #ffd6ea;
  --c-yuuna-grad-start: #ff8fab;
  --c-yuuna-grad-end: #ff4d8b;

  --c-ayano-primary: #7b6cf6;
  --c-ayano-light: #dbd8ff;
  --c-ayano-grad-start: #9b8ff8;
  --c-ayano-grad-end: #6c63ff;

  --c-child-primary: var(--c-yuuna-primary);
  --c-child-light: var(--c-yuuna-light);
  --c-child-grad: linear-gradient(135deg, var(--c-yuuna-grad-start), var(--c-yuuna-grad-end));

  --c-earn: #4caf50;
  --c-earn-light: #e8f5e9;
  --c-spend: #ff7043;
  --c-spend-light: #fff3e0;
  --c-danger: #ef5350;
}
body[data-child="ayano"] {
  --c-child-primary: var(--c-ayano-primary);
  --c-child-light: var(--c-ayano-light);
  --c-child-grad: linear-gradient(135deg, var(--c-ayano-grad-start), var(--c-ayano-grad-end));
}

/* === Animations === */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
@keyframes popIn {
  0%   { transform: scale(0.8); opacity: 0; }
  70%  { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes pointBounce {
  0%, 100% { transform: scale(1); }
  40% { transform: scale(1.3); }
  70% { transform: scale(0.95); }
}
@keyframes toastShow {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to   { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* === Screen System === */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }

/* === Max-width container === */
.container {
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  padding: 0 16px;
}

/* === Child Select Screen === */
#screen-child-select {
  background: linear-gradient(160deg, #fff5f9 0%, #f5f3ff 100%);
  justify-content: center;
  align-items: center;
  padding: 24px 20px;
  gap: 20px;
}
.app-title {
  text-align: center;
  font-size: 28px;
  font-weight: 800;
  color: var(--c-text);
  margin-bottom: 4px;
}
.app-subtitle {
  text-align: center;
  font-size: 16px;
  color: var(--c-muted);
  margin-bottom: 24px;
}
.child-cards {
  display: flex;
  flex-direction: column;
  gap: 16px;
  width: 100%;
  max-width: 360px;
}
.child-card {
  border-radius: 24px;
  padding: 28px 24px;
  cursor: pointer;
  box-shadow: 0 8px 0 rgba(0,0,0,0.15);
  transition: transform 0.15s, box-shadow 0.15s;
  display: flex;
  align-items: center;
  gap: 16px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.child-card:active {
  transform: translateY(4px);
  box-shadow: 0 4px 0 rgba(0,0,0,0.15);
}
.child-card.yuuna { background: linear-gradient(135deg, #ff8fab, #ff4d8b); }
.child-card.ayano { background: linear-gradient(135deg, #9b8ff8, #6c63ff); }
.child-card-emoji { font-size: 48px; line-height: 1; }
.child-card-info { flex: 1; }
.child-card-name { font-size: 26px; font-weight: 800; color: #fff; }
.child-card-pts { font-size: 14px; color: rgba(255,255,255,0.85); margin-top: 4px; }
.child-card-arrow { font-size: 24px; color: rgba(255,255,255,0.7); }

/* === Top Bar === */
#top-bar {
  background: var(--c-child-grad);
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top));
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  flex-shrink: 0;
}
.top-bar-back {
  background: rgba(255,255,255,0.25);
  border: none;
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.top-bar-name {
  flex: 1;
  font-size: 18px;
  font-weight: 800;
  color: #fff;
  text-align: center;
}
.top-bar-pts {
  background: rgba(255,255,255,0.25);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
}

/* === Bottom Nav === */
#bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--c-white);
  border-top: 1px solid var(--c-border);
  display: flex;
  padding-bottom: env(safe-area-inset-bottom);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 4px 8px;
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: inherit;
  color: var(--c-muted);
  font-size: 11px;
  font-weight: 700;
  transition: color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.nav-btn .nav-icon { font-size: 22px; }
.nav-btn.active { color: var(--c-child-primary); }
.nav-btn.active .nav-icon { animation: popIn 0.3s ease; }

/* === Tab Panes === */
.tab-pane { display: none; flex: 1; overflow-y: auto; padding-bottom: 80px; }
.tab-pane.active { display: block; animation: fadeIn 0.25s ease; }

/* === Cards === */
.card {
  background: var(--c-white);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

/* === Buttons === */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: none;
  border-radius: 50px;
  padding: 12px 24px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.96); }
.btn-child {
  background: var(--c-child-grad);
  color: #fff;
  box-shadow: 0 4px 0 rgba(0,0,0,0.15);
}
.btn-child:active { box-shadow: 0 2px 0 rgba(0,0,0,0.15); transform: translateY(2px); }
.btn-outline {
  background: transparent;
  border: 2px solid var(--c-child-primary);
  color: var(--c-child-primary);
}
.btn-danger {
  background: var(--c-danger);
  color: #fff;
}
.btn-ghost {
  background: var(--c-border);
  color: var(--c-text);
}
.btn-sm { padding: 7px 14px; font-size: 13px; }
.btn-block { width: 100%; }

/* === Section Headers === */
.section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--c-muted);
  letter-spacing: 0.05em;
  margin: 20px 0 10px;
  padding: 0 2px;
}

/* === HOME TAB === */
.balance-card {
  background: var(--c-child-grad);
  border-radius: var(--radius);
  padding: 28px 20px;
  text-align: center;
  box-shadow: var(--shadow-deep);
  margin-bottom: 12px;
}
.balance-label { font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 700; }
.balance-number {
  font-size: 60px;
  font-weight: 800;
  color: #fff;
  line-height: 1.1;
  display: inline-block;
}
.balance-unit { font-size: 22px; color: rgba(255,255,255,0.9); font-weight: 700; }
.balance-sub {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 8px;
}
.balance-sub-item { font-size: 12px; color: rgba(255,255,255,0.75); }
.balance-sub-item span { font-weight: 700; color: #fff; }

.record-btn-wrap { margin-bottom: 12px; }

.record-list { }
.record-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: var(--c-white);
  margin-bottom: 8px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  animation: fadeIn 0.2s ease;
}
.record-emoji { font-size: 24px; }
.record-info { flex: 1; }
.record-name { font-size: 14px; font-weight: 700; color: var(--c-text); }
.record-date { font-size: 11px; color: var(--c-muted); margin-top: 2px; }
.record-pts { font-size: 16px; font-weight: 800; color: var(--c-earn); }

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--c-muted);
}
.empty-state .empty-icon { font-size: 48px; margin-bottom: 8px; }
.empty-state p { font-size: 14px; }

/* === RECORD MODAL === */
#modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: flex;
  align-items: flex-end;
}
#modal-backdrop.hidden { display: none; }
.modal-sheet {
  background: var(--c-white);
  border-radius: 24px 24px 0 0;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 12px 16px 32px;
  padding-bottom: calc(32px + env(safe-area-inset-bottom));
  animation: slideUp 0.3s ease;
}
.modal-handle {
  width: 40px; height: 4px;
  background: var(--c-border);
  border-radius: 2px;
  margin: 0 auto 16px;
}
.modal-title {
  font-size: 18px;
  font-weight: 800;
  text-align: center;
  margin-bottom: 16px;
  color: var(--c-text);
}
.chore-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.chore-tile {
  background: #fafafa;
  border: 2px solid var(--c-border);
  border-radius: var(--radius-sm);
  padding: 14px 10px;
  text-align: center;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.15s, background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.chore-tile:active {
  transform: scale(0.95);
  background: var(--c-child-light);
  border-color: var(--c-child-primary);
}
.chore-tile-emoji { font-size: 32px; margin-bottom: 6px; }
.chore-tile-name { font-size: 13px; font-weight: 700; color: var(--c-text); margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.chore-tile-pts { font-size: 12px; font-weight: 700; color: var(--c-earn); }

/* === REWARDS TAB === */
.inner-tabs {
  display: flex;
  background: var(--c-border);
  border-radius: 12px;
  padding: 3px;
  margin-bottom: 16px;
}
.inner-tab {
  flex: 1;
  padding: 8px;
  text-align: center;
  font-size: 13px;
  font-weight: 700;
  border-radius: 10px;
  cursor: pointer;
  color: var(--c-muted);
  transition: background 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.inner-tab.active { background: var(--c-white); color: var(--c-child-primary); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }

.inner-pane { display: none; }
.inner-pane.active { display: block; animation: fadeIn 0.2s ease; }

.reward-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 12px;
  background: var(--c-white);
  border-radius: var(--radius-sm);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 10px;
}
.reward-emoji { font-size: 32px; }
.reward-info { flex: 1; }
.reward-name { font-size: 15px; font-weight: 700; }
.reward-cost { font-size: 13px; color: var(--c-spend); font-weight: 700; margin-top: 2px; }
.reward-use-btn {
  background: var(--c-child-grad);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.reward-use-btn:disabled {
  background: var(--c-border);
  color: var(--c-muted);
  cursor: not-allowed;
}

.redemption-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--c-white);
  border-radius: var(--radius-sm);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 8px;
}
.redemption-pts { font-size: 15px; font-weight: 800; color: var(--c-spend); }

/* === CONFIRM DIALOG === */
#confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#confirm-overlay.hidden { display: none; }
.confirm-box {
  background: var(--c-white);
  border-radius: var(--radius);
  padding: 24px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  animation: popIn 0.25s ease;
  box-shadow: var(--shadow-deep);
}
.confirm-emoji { font-size: 40px; margin-bottom: 8px; }
.confirm-title { font-size: 17px; font-weight: 800; margin-bottom: 6px; }
.confirm-sub { font-size: 14px; color: var(--c-muted); margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-btns .btn { flex: 1; }

/* === STATS TAB === */
.stats-chart-wrap {
  background: var(--c-white);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
  overflow: hidden;
}
.chart-title { font-size: 15px; font-weight: 800; margin-bottom: 4px; }
.chart-subtitle { font-size: 12px; color: var(--c-muted); margin-bottom: 12px; }
.chart-legend { display: flex; gap: 16px; margin-top: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--c-muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 3px; }

.stats-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}
.stats-table th {
  text-align: left;
  padding: 8px 10px;
  background: var(--c-bg);
  font-size: 12px;
  font-weight: 700;
  color: var(--c-muted);
}
.stats-table td {
  padding: 10px;
  border-bottom: 1px solid var(--c-border);
  font-weight: 700;
}
.stats-table tr:last-child td { border-bottom: none; }

/* === SETTINGS TAB === */
.settings-section { margin-bottom: 24px; }
.settings-section-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.settings-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px;
  background: var(--c-white);
  border-radius: var(--radius-sm);
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  margin-bottom: 8px;
}
.settings-item-emoji { font-size: 24px; }
.settings-item-info { flex: 1; }
.settings-item-name { font-size: 14px; font-weight: 700; }
.settings-item-pts { font-size: 12px; color: var(--c-muted); margin-top: 2px; }
.settings-item-actions { display: flex; gap: 6px; }
.icon-btn {
  background: var(--c-border);
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:hover { background: #e0d4c4; }

/* Delete confirm inline */
.delete-confirm {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 12px;
  background: #fff5f5;
  border: 2px solid #ffcdd2;
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  font-size: 13px;
  font-weight: 700;
  color: var(--c-danger);
  animation: fadeIn 0.2s ease;
}
.delete-confirm span { flex: 1; }
.delete-confirm .btn { padding: 5px 12px; font-size: 12px; }

/* Inline form */
.inline-form {
  background: var(--c-child-light);
  border: 2px solid var(--c-child-primary);
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  animation: fadeIn 0.2s ease;
}
.inline-form-title { font-size: 13px; font-weight: 800; color: var(--c-child-primary); margin-bottom: 10px; }
.form-row { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 8px; flex-wrap: wrap; }
.form-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 80px; }
.form-field label { font-size: 11px; font-weight: 700; color: var(--c-muted); }
.form-input {
  border: 2px solid var(--c-border);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 14px;
  font-family: inherit;
  font-weight: 700;
  background: var(--c-white);
  outline: none;
  width: 100%;
}
.form-input:focus { border-color: var(--c-child-primary); }
.emoji-picker { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.emoji-opt {
  font-size: 22px;
  padding: 4px;
  cursor: pointer;
  border-radius: 6px;
  border: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.emoji-opt.selected { border-color: var(--c-child-primary); background: var(--c-child-light); }
.form-actions { display: flex; gap: 8px; }

.form-error { font-size: 12px; color: var(--c-danger); margin-top: 4px; font-weight: 700; }

/* === SYNC INDICATOR === */
.sync-indicator {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 12px;
  background: rgba(255,255,255,0.2);
  color: #fff;
  white-space: nowrap;
  display: none;
}
.sync-indicator.visible { display: inline-flex; align-items: center; gap: 4px; }
.sync-indicator.syncing { background: rgba(255,255,255,0.2); }
.sync-indicator.synced { background: rgba(76,175,80,0.35); }
.sync-indicator.error { background: rgba(255,112,67,0.4); }

/* === Firebase Settings UI === */
.firebase-setup-card {
  background: #f0f4ff;
  border: 2px solid #c5cae9;
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
}
.firebase-connected-card {
  background: #e8f5e9;
  border: 2px solid #a5d6a7;
  border-radius: var(--radius-sm);
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.firebase-connected-info { flex: 1; }
.firebase-connected-title { font-size: 14px; font-weight: 800; color: #2e7d32; }
.firebase-connected-sub { font-size: 12px; color: #388e3c; margin-top: 2px; }
.firebase-setup-title { font-size: 14px; font-weight: 800; color: #3949ab; margin-bottom: 6px; }
.firebase-setup-desc { font-size: 12px; color: #5c6bc0; margin-bottom: 10px; line-height: 1.6; }
.firebase-steps {
  background: #fff;
  border-radius: 8px;
  padding: 10px 12px;
  margin-bottom: 10px;
  font-size: 12px;
  color: var(--c-text);
  line-height: 1.8;
}
.firebase-steps summary { font-weight: 700; cursor: pointer; color: #3949ab; }
.firebase-steps ol { margin: 6px 0 0 16px; }
.firebase-config-input {
  width: 100%;
  border: 2px solid #c5cae9;
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 12px;
  font-family: monospace;
  min-height: 80px;
  resize: vertical;
  outline: none;
  background: #fff;
}
.firebase-config-input:focus { border-color: #3949ab; }
.firebase-config-error { font-size: 12px; color: var(--c-danger); margin-top: 4px; font-weight: 700; }

/* === TOAST === */
#toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 700;

<script>
// ─── FirebaseSync ─────────────────────────────────────────────
const FirebaseSync = {
  _app: null,
  _db: null,
  _ref: null,
  _configKey: 'otetsudai-firebase-config',
  _status: 'unconfigured', // 'unconfigured'|'connecting'|'connected'|'error'
  _ignoreNextRemote: false, // prevent echo after local write

  loadConfig() {
    try {
      const raw = localStorage.getItem(this._configKey);
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  },

  saveConfig(cfg) {
    localStorage.setItem(this._configKey, JSON.stringify(cfg));
  },

  clearConfig() {
    localStorage.removeItem(this._configKey);
    this.stopListening();
    if (this._app) {
      try { this._app.delete(); } catch(e) {}
      this._app = null; this._db = null; this._ref = null;
    }
    this._status = 'unconfigured';
    this._updateIndicator();
  },

  isReady() { return this._status === 'connected' || this._status === 'connecting'; },

  async init(cfg) {
    try {
      this._status = 'connecting';
      this._updateIndicator();
      // Delete existing app instance if any
      if (this._app) {
        try { await this._app.delete(); } catch(e) {}
        this._app = null; this._db = null; this._ref = null;
      }
      this._app = firebase.initializeApp(cfg, 'otetsudai-' + Date.now());
      this._db = firebase.database(this._app);
      this._ref = this._db.ref('/otetsudai');
      return true;
    } catch(e) {
      console.error('Firebase init error:', e);
      this._status = 'error';
      this._updateIndicator();
      return false;
    }
  },

  push(data) {
    if (!this._ref || this._status === 'unconfigured') return;
    this._ignoreNextRemote = true;
    this._status = 'connecting';
    this._updateIndicator();
    this._ref.set(data)
      .then(() => { this._status = 'connected'; this._updateIndicator(); })
      .catch(e => { console.error('Firebase write error:', e); this._status = 'error'; this._updateIndicator(); });
  },

  listen(onData) {
    if (!this._ref) return;
    this._ref.on('value', snap => {
      if (this._ignoreNextRemote) { this._ignoreNextRemote = false; return; }
      this._status = 'connected';
      this._updateIndicator();
      onData(normalizeFirebaseData(snap.val()));
    }, err => {
      console.error('Firebase listen error:', err);
      this._status = 'error';
      this._updateIndicator();
    });
  },

  stopListening() {
    if (this._ref) this._ref.off();
  },

  getStatus() { return this._status; },

  _updateIndicator() {
    const el = document.getElementById('sync-indicator');
    if (!el) return;
    el.className = 'sync-indicator';
    if (this._status === 'unconfigured') { el.classList.remove('visible'); return; }
    el.classList.add('visible');
    if (this._status === 'connecting') { el.classList.add('syncing'); el.textContent = '🔄'; }
    else if (this._status === 'connected') { el.classList.add('synced'); el.textContent = '✅'; }
    else if (this._status === 'error') { el.classList.add('error'); el.textContent = '⚠️'; }
  }
};

// ─── Storage ──────────────────────────────────────────────────
const STORAGE_KEY = 'otetsudai-app';

const Storage = {
  _cache: null,
  load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        // Normalize in case localStorage has corrupted data from old Firebase sync
        this._cache = normalizeFirebaseData(parsed) || this._makeDefault();
        return this._cache;
      }
    } catch(e) {}
    this._cache = this._makeDefault();
    this.save(this._cache);
    return this._cache;
  },
  save(data) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    } catch(e) {
      Renderer.showToast('⚠️ データの保存に失敗しました');
    }
  },
  getData() { return this._cache || this.load(); },
  setData(data) { this._cache = data; this.save(data); FirebaseSync.push(data); },
  _makeDefault() {
    return {
      chores: [
        {id: genId(), name: 'お皿洗い',       points: 5,  emoji: '🍽️'},
        {id: genId(), name: 'テーブル拭き',   points: 3,  emoji: '🪣'},
        {id: genId(), name: '掃き掃除',       points: 5,  emoji: '🧹'},
        {id: genId(), name: 'お風呂洗い',     points: 8,  emoji: '🛁'},
        {id: genId(), name: '洗濯物たたみ',   points: 5,  emoji: '👕'},
        {id: genId(), name: '洗濯物干し',     points: 8,  emoji: '🌤️'},
        {id: genId(), name: 'ごみ出し',       points: 5,  emoji: '🗑️'},
        {id: genId(), name: '部屋の片付け',   points: 5,  emoji: '📦'},
        {id: genId(), name: '買い物の手伝い', points: 10, emoji: '🛒'},
        {id: genId(), name: '料理の手伝い',   points: 10, emoji: '👨‍🍳'},
      ],
      rewards: [
        {id: genId(), name: 'アイス',               points: 30,  emoji: '🍦'},
        {id: genId(), name: 'ジュース1本',           points: 20,  emoji: '🧃'},
        {id: genId(), name: '好きなおやつ1つ',       points: 50,  emoji: '🍬'},
        {id: genId(), name: 'ゲーム30分追加',         points: 80,  emoji: '🎮'},
        {id: genId(), name: '好きな夕飯リクエスト',   points: 150, emoji: '🍜'},
        {id: genId(), name: 'お出かけリクエスト',     points: 300, emoji: '🎡'},
      ],
      children: {
        yuuna: {records: [], redemptions: []},
        ayano: {records: [], redemptions: []},
      }
    };
  }
};

// ─── Firebase data normalizer ─────────────────────────────────
// Firebase strips empty arrays and converts arrays to objects.
// This restores the expected structure before storing locally.
function normalizeFirebaseData(data) {
  if (!data) return null;
  const toArr = v => !v ? [] : Array.isArray(v) ? v : Object.values(v);
  data.chores  = toArr(data.chores);
  data.rewards = toArr(data.rewards);
  if (!data.children) data.children = {};
  ['yuuna','ayano'].forEach(c => {
    if (!data.children[c]) data.children[c] = {};
    data.children[c].records     = toArr(data.children[c].records);
    data.children[c].redemptions = toArr(data.children[c].redemptions);
  });
  return data;
}

// ─── Helpers ──────────────────────────────────────────────────
function genId() {
  return typeof crypto !== 'undefined' && crypto.randomUUID
    ? crypto.randomUUID()
    : `${Date.now()}-${Math.random().toString(36).slice(2)}`;
}

const DateUtils = {
  today() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  },
  getYearMonth(dateStr) { return dateStr.slice(0,7); },
  formatDisplay(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const days = ['日','月','火','水','木','金','土'];
    return `${d.getMonth()+1}月${d.getDate()}日（${days[d.getDay()]}）`;
  },
  getLast6Months() {
    const result = [];
    const d = new Date();
    for (let i = 5; i >= 0; i--) {
      const t = new Date(d.getFullYear(), d.getMonth() - i, 1);
      result.push(`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`);
    }
    return result;
  },
  formatMonthLabel(ym) {
    const parts = ym.split('-');
    return `${parseInt(parts[1])}月`;
  },
  formatMonthFull(ym) {
    const parts = ym.split('-');
    return `${parts[0]}年${parseInt(parts[1])}月`;
  }
};

// ─── DataStore ────────────────────────────────────────────────
const DataStore = {
  getChores() { return Storage.getData().chores; },
  addChore(name, emoji, points) {
    const d = Storage.getData();
    d.chores.push({id: genId(), name, emoji, points: parseInt(points)});
    Storage.setData(d);
  },
  updateChore(id, name, emoji, points) {
    const d = Storage.getData();
    const c = d.chores.find(x => x.id === id);
    if (c) { c.name = name; c.emoji = emoji; c.points = parseInt(points); }
    Storage.setData(d);
  },
  deleteChore(id) {
    const d = Storage.getData();
    d.chores = d.chores.filter(x => x.id !== id);
    Storage.setData(d);
  },

  getRewards() { return Storage.getData().rewards; },
  addReward(name, emoji, points) {
    const d = Storage.getData();
    d.rewards.push({id: genId(), name, emoji, points: parseInt(points)});
    Storage.setData(d);
  },
  updateReward(id, name, emoji, points) {
    const d = Storage.getData();
    const r = d.rewards.find(x => x.id === id);
    if (r) { r.name = name; r.emoji = emoji; r.points = parseInt(points); }
    Storage.setData(d);
  },
  deleteReward(id) {
    const d = Storage.getData();
    d.rewards = d.rewards.filter(x => x.id !== id);
    Storage.setData(d);
  },

  getRecords(childKey) { return Storage.getData().children[childKey].records; },
  addRecord(childKey, choreId) {
    const d = Storage.getData();
    const chore = d.chores.find(c => c.id === choreId);
    if (!chore) return null;
    const rec = {id: genId(), choreId, choreName: chore.name, choreEmoji: chore.emoji, date: DateUtils.today(), points: chore.points};
    d.children[childKey].records.push(rec);
    Storage.setData(d);
    return rec;
  },
  getRecentRecords(childKey, n) {
    const recs = this.getRecords(childKey);
    return recs.slice().reverse().slice(0, n);
  },

  getRedemptions(childKey) { return Storage.getData().children[childKey].redemptions; },
  addRedemption(childKey, rewardId) {
    const d = Storage.getData();
    const reward = d.rewards.find(r => r.id === rewardId);
    if (!reward) return {ok: false, msg: 'ご褒美が見つかりません'};
    const balance = this.getBalance(childKey);
    if (balance < reward.points) return {ok: false, msg: 'ポイントが足りないよ！'};
    const red = {id: genId(), rewardId, rewardName: reward.name, rewardEmoji: reward.emoji, date: DateUtils.today(), points: reward.points};
    d.children[childKey].redemptions.push(red);
    Storage.setData(d);
    return {ok: true, redemption: red};
  },

  getTotalEarned(childKey) {
    return this.getRecords(childKey).reduce((s, r) => s + r.points, 0);
  },
  getTotalSpent(childKey) {
    return this.getRedemptions(childKey).reduce((s, r) => s + r.points, 0);
  },
  getBalance(childKey) {
    return this.getTotalEarned(childKey) - this.getTotalSpent(childKey);
  },
  getMonthlyEarned(childKey, ym) {
    return this.getRecords(childKey).filter(r => DateUtils.getYearMonth(r.date) === ym).reduce((s,r)=>s+r.points,0);
  },
  getMonthlySpent(childKey, ym) {
    return this.getRedemptions(childKey).filter(r => DateUtils.getYearMonth(r.date) === ym).reduce((s,r)=>s+r.points,0);
  },
  getMonthlyChoreCount(childKey, ym) {
    return this.getRecords(childKey).filter(r => DateUtils.getYearMonth(r.date) === ym).length;
  },
  getChoreBreakdown(childKey, ym) {
    const recs = this.getRecords(childKey).filter(r => DateUtils.getYearMonth(r.date) === ym);
    const map = {};
    recs.forEach(r => {
      if (!map[r.choreId]) map[r.choreId] = {choreName: r.choreName, choreEmoji: r.choreEmoji || '⭐', count: 0};
      map[r.choreId].count++;
    });
    return Object.values(map).sort((a,b) => b.count - a.count);
  }
};

// ─── Chart ────────────────────────────────────────────────────
const Chart = {
  build(earnedArr, spentArr, labels) {
    const W = 340, H = 180;
    const padL = 30, padB = 24, padT = 10, padR = 8;
    const chartW = W - padL - padR;
    const chartH = H - padB - padT;
    const n = labels.length;
    const maxVal = Math.max(...earnedArr, ...spentArr, 1);
    // Pick a round step so grid labels are always clean integers
    const steps = [1,2,5,10,20,50,100,200,500,1000];
    const rawStep = maxVal / 4;
    const step = steps.find(s => s >= rawStep) || 1000;
    const topVal = step * 4;

    const allZero = earnedArr.every(v=>v===0) && spentArr.every(v=>v===0);

    let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block" xmlns="http://www.w3.org/2000/svg">`;

    // Grid lines (4 divisions, always integer labels)
    for (let i = 0; i <= 4; i++) {
      const yv = step * i;
      const y = padT + chartH - (yv / topVal) * chartH;
      svg += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#f0e4d4" stroke-width="1"/>`;
      svg += `<text x="${padL-4}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="9" fill="#9e8e7e" font-family="'M PLUS Rounded 1c',sans-serif">${yv}</text>`;
    }

    if (allZero) {
      svg += `<text x="${W/2}" y="${H/2}" text-anchor="middle" font-size="13" fill="#9e8e7e" font-family="'M PLUS Rounded 1c',sans-serif">まだきろくがないよ！</text>`;
    } else {
      const groupW = chartW / n;
      const barW = Math.min(14, groupW * 0.35);
      const gap = 3;

      for (let i = 0; i < n; i++) {
        const gx = padL + i * groupW + groupW / 2;
        const x1 = gx - barW - gap / 2;
        const x2 = gx + gap / 2;

        // Earned bar
        const eh = Math.max(earnedArr[i] > 0 ? (earnedArr[i] / topVal) * chartH : 0, earnedArr[i]>0?2:0);
        if (eh > 0) {
          const ey = padT + chartH - eh;
          svg += `<rect x="${x1.toFixed(1)}" y="${ey.toFixed(1)}" width="${barW}" height="${eh.toFixed(1)}" rx="3" fill="#4caf50"/>`;
          if (eh > 16) svg += `<text x="${(x1+barW/2).toFixed(1)}" y="${(ey-3).toFixed(1)}" text-anchor="middle" font-size="8" fill="#4caf50" font-family="'M PLUS Rounded 1c',sans-serif">${earnedArr[i]}</text>`;
        }

        // Spent bar
        const sh = spentArr[i] > 0 ? (spentArr[i] / topVal) * chartH : 0;
        if (sh > 0) {
          const sy = padT + chartH - sh;
          svg += `<rect x="${x2.toFixed(1)}" y="${sy.toFixed(1)}" width="${barW}" height="${sh.toFixed(1)}" rx="3" fill="#ff7043"/>`;
          if (sh > 16) svg += `<text x="${(x2+barW/2).toFixed(1)}" y="${(sy-3).toFixed(1)}" text-anchor="middle" font-size="8" fill="#ff7043" font-family="'M PLUS Rounded 1c',sans-serif">${spentArr[i]}</text>`;
        }

        // X label
        svg += `<text x="${gx.toFixed(1)}" y="${(H-6).toFixed(1)}" text-anchor="middle" font-size="10" fill="#9e8e7e" font-family="'M PLUS Rounded 1c',sans-serif">${labels[i]}</text>`;
      }
    }

    svg += `</svg>`;
    return svg;
  }
};

// ─── Renderer ─────────────────────────────────────────────────
const Renderer = {
  updateChildSelect() {
    ['yuuna','ayano'].forEach(c => {
      const el = document.getElementById(`${c}-pts-preview`);
      if (el) el.textContent = `${DataStore.getBalance(c)} pt`;
    });
  },

  updateTopBar(childKey) {
    const info = {yuuna: {name:'ゆうな', emoji:'🌸'}, ayano: {name:'あやの', emoji:'🌟'}};
    const i = info[childKey];
    document.getElementById('top-bar-name').textContent = `${i.name} ${i.emoji}`;
    document.getElementById('top-bar-pts').textContent = `⭐ ${DataStore.getBalance(childKey)} pt`;
    document.body.dataset.child = childKey;
  },

  renderHome(childKey) {
    const balance = DataStore.getBalance(childKey);
    const earned = DataStore.getTotalEarned(childKey);
    const spent = DataStore.getTotalSpent(childKey);
    document.getElementById('balance-num').textContent = balance;
    document.getElementById('balance-earned').textContent = earned;
    document.getElementById('balance-spent').textContent = spent;
    document.getElementById('top-bar-pts').textContent = `⭐ ${balance} pt`;

    const el = document.getElementById('recent-records');
    const recs = DataStore.getRecentRecords(childKey, 7);
    if (recs.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>まだきろくがないよ！<br>おてつだいをしたらきろくしよう！</p></div>`;
    } else {
      el.innerHTML = recs.map(r => `
        <div class="record-item">
          <div class="record-emoji">${r.choreEmoji||'⭐'}</div>
          <div class="record-info">
            <div class="record-name">${escHtml(r.choreName)}</div>
            <div class="record-date">${DateUtils.formatDisplay(r.date)}</div>
          </div>
          <div class="record-pts">+${r.points}pt</div>
        </div>`).join('');
    }
  },

  renderChoreGrid() {
    const chores = DataStore.getChores();
    const el = document.getElementById('chore-grid');
    if (chores.length === 0) {
      el.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:24px;color:var(--c-muted)">おてつだいがまだないよ！<br>設定から追加してね</div>`;
      return;
    }
    el.innerHTML = chores.map(c => `
      <div class="chore-tile" onclick="App.recordChore('${c.id}')">
        <div class="chore-tile-emoji">${c.emoji}</div>
        <div class="chore-tile-name" title="${escHtml(c.name)}">${escHtml(c.name)}</div>
        <div class="chore-tile-pts">+${c.points} pt</div>
      </div>`).join('');
  },

  renderRewards(childKey) {
    const rewards = DataStore.getRewards();
    const balance = DataStore.getBalance(childKey);
    const el = document.getElementById('rewards-list-pane');
    if (rewards.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🎁</div><p>ご褒美がまだないよ！<br>設定から追加してね</p></div>`;
    } else {
      el.innerHTML = rewards.map(r => {
        const canUse = balance >= r.points;
        return `<div class="reward-item">
          <div class="reward-emoji">${r.emoji}</div>
          <div class="reward-info">
            <div class="reward-name">${escHtml(r.name)}</div>
            <div class="reward-cost">−${r.points} pt</div>
          </div>
          <button class="reward-use-btn" ${canUse?'':'disabled'} onclick="App.confirmReward('${r.id}')">
            ${canUse ? '使う！' : 'ポイントたりない'}
          </button>
        </div>`;
      }).join('');
    }
    this.renderRedemptionHistory(childKey);
  },

  renderRedemptionHistory(childKey) {
    const reds = DataStore.getRedemptions(childKey).slice().reverse();
    const el = document.getElementById('rewards-history-pane');
    if (reds.length === 0) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">📜</div><p>まだつかってないよ！</p></div>`;
    } else {
      el.innerHTML = reds.map(r => `
        <div class="redemption-item">
          <div class="record-emoji">${r.rewardEmoji||'🎁'}</div>
          <div class="record-info">
            <div class="record-name">${escHtml(r.rewardName)}</div>
            <div class="record-date">${DateUtils.formatDisplay(r.date)}</div>
          </div>
          <div class="redemption-pts">−${r.points}pt</div>
        </div>`).join('');
    }
  },

  renderStats(childKey) {
    const months = DateUtils.getLast6Months();
    const labels = months.map(DateUtils.formatMonthLabel);
    const earned = months.map(ym => DataStore.getMonthlyEarned(childKey, ym));
    const spent = months.map(ym => DataStore.getMonthlySpent(childKey, ym));
    document.getElementById('bar-chart-svg').innerHTML = Chart.build(earned, spent, labels);

    // Monthly count table
    const countEl = document.getElementById('monthly-count-table');
    const rows = months.slice().reverse().map(ym => {
      const cnt = DataStore.getMonthlyChoreCount(childKey, ym);
      const e = DataStore.getMonthlyEarned(childKey, ym);
      return `<tr><td>${DateUtils.formatMonthFull(ym)}</td><td style="text-align:right;color:var(--c-text)">${cnt} 回</td><td style="text-align:right;color:var(--c-earn)">+${e} pt</td></tr>`;
    }).join('');
    countEl.innerHTML = `<table class="stats-table"><thead><tr><th>月</th><th style="text-align:right">回数</th><th style="text-align:right">獲得pt</th></tr></thead><tbody>${rows}</tbody></table>`;

    // Chore breakdown (current month)
    const curYm = DateUtils.getYearMonth(DateUtils.today());
    const breakdown = DataStore.getChoreBreakdown(childKey, curYm);
    const bEl = document.getElementById('chore-breakdown-table');
    if (breakdown.length === 0) {
      bEl.innerHTML = `<p style="color:var(--c-muted);font-size:13px;padding:8px 0">今月のきろくはまだないよ</p>`;
    } else {
      const bRows = breakdown.map(b => `<tr><td>${b.choreEmoji} ${escHtml(b.choreName)}</td><td style="text-align:right;font-weight:700">${b.count} 回</td></tr>`).join('');
      bEl.innerHTML = `<table class="stats-table"><thead><tr><th>おてつだい</th><th style="text-align:right">回数</th></tr></thead><tbody>${bRows}</tbody></table>`;
    }
  },

  renderSettings() {
    this.renderChoreSettings();
    this.renderRewardSettings();
    this.renderFirebaseSettings();
  },

  renderFirebaseSettings() {
    const el = document.getElementById('firebase-settings-ui');
    if (!el) return;
    const status = FirebaseSync.getStatus();
    if (status === 'connected' || status === 'connecting') {
      const cfg = FirebaseSync.loadConfig();
      const projectId = cfg && cfg.projectId ? cfg.projectId : '接続済み';
      el.innerHTML = `<div class="firebase-connected-card">
        <div style="font-size:28px">☁️</div>
        <div class="firebase-connected-info">
          <div class="firebase-connected-title">✅ Firebase接続済み</div>
          <div class="firebase-connected-sub">プロジェクト: ${escHtml(projectId)}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="Settings.disconnectFirebase()">接続解除</button>
      </div>`;
    } else {
      el.innerHTML = `<div class="firebase-setup-card">
        <div class="firebase-setup-title">☁️ Firebase同期を設定する</div>
        <div class="firebase-setup-desc">設定すると、iPhoneとMacでポイントが自動で同期されます。</div>
        <details class="firebase-steps">
          <summary>📋 設定方法を見る</summary>
          <ol>
            <li>console.firebase.google.com にアクセス</li>
            <li>「プロジェクトを追加」→ プロジェクト名を入力して作成</li>
            <li>左メニュー「構築」→「Realtime Database」→「データベースを作成」→「テストモード」で開始</li>
            <li>⚙️「プロジェクトの設定」→「マイアプリ」→「&lt;/&gt; ウェブ」でアプリを追加</li>
            <li><code>firebaseConfig</code> のオブジェクト部分をコピーして下に貼り付け</li>
          </ol>
        </details>
        <div style="margin-top:10px;font-size:12px;font-weight:700;color:#5c6bc0;margin-bottom:4px">firebaseConfig を貼り付け:</div>
        <textarea class="firebase-config-input" id="firebase-config-textarea" placeholder='{\n  "apiKey": "...",\n  "databaseURL": "https://...",\n  ...\n}'></textarea>
        <div class="firebase-config-error hidden" id="firebase-config-error"></div>
        <div style="margin-top:10px">
          <button class="btn btn-child btn-sm" onclick="Settings.connectFirebase()">☁️ 接続する</button>
        </div>
        ${status === 'error' ? '<div style="margin-top:8px;font-size:12px;color:var(--c-danger);font-weight:700">⚠️ 接続エラー。設定を確認してください。</div>' : ''}
      </div>`;
    }
  },

  renderChoreSettings() {
    const chores = DataStore.getChores();
    const el = document.getElementById('chore-settings-list');
    if (chores.length === 0) {
      el.innerHTML = `<p style="color:var(--c-muted);font-size:13px">まだおてつだいがないよ</p>`;
      return;
    }
    el.innerHTML = chores.map(c => `
      <div class="settings-item" id="chore-item-${c.id}">
        <div class="settings-item-emoji">${c.emoji}</div>
        <div class="settings-item-info">
          <div class="settings-item-name">${escHtml(c.name)}</div>
          <div class="settings-item-pts">${c.points} pt</div>
        </div>
        <div class="settings-item-actions">
          <button class="icon-btn" onclick="Settings.openEditChore('${c.id}')" title="編集">✏️</button>
          <button class="icon-btn" onclick="Settings.confirmDeleteChore('${c.id}')" title="削除">🗑️</button>
        </div>
      </div>`).join('');
  },

  renderRewardSettings() {
    const rewards = DataStore.getRewards();
    const el = document.getElementById('reward-settings-list');
    if (rewards.length === 0) {
      el.innerHTML = `<p style="color:var(--c-muted);font-size:13px">まだご褒美がないよ</p>`;
      return;
    }
    el.innerHTML = rewards.map(r => `
      <div class="settings-item" id="reward-item-${r.id}">
        <div class="settings-item-emoji">${r.emoji}</div>
        <div class="settings-item-info">
          <div class="settings-item-name">${escHtml(r.name)}</div>
          <div class="settings-item-pts">${r.points} pt</div>
        </div>
        <div class="settings-item-actions">
          <button class="icon-btn" onclick="Settings.openEditReward('${r.id}')" title="編集">✏️</button>
          <button class="icon-btn" onclick="Settings.confirmDeleteReward('${r.id}')" title="削除">🗑️</button>
        </div>
      </div>`).join('');

  showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.remove('hidden');
    clearTimeout(this._toastTimer);
    this._toastTimer = setTimeout(() => el.classList.add('hidden'), 2500);

};

// ─── Settings ─────────────────────────────────────────────────
const CHORE_EMOJIS = ['🍽️','🪣','🧹','🛁','👕','🌤️','🗑️','📦','🛒','👨‍🍳','🧺','🚿','🪴','🐕','🌿','⭐','🧽','🫧'];
const REWARD_EMOJIS = ['🍦','🧃','🍬','🎮','🍜','🎡','🍕','🎂','🎠','🏖️','🎪','🎯','📚','🎨','🎵','⭐','🌟','💝'];

const Settings = {
  _choreEditId: null,
  _rewardEditId: null,
  _selectedChoreEmoji: '⭐',
  _selectedRewardEmoji: '⭐',

  _renderChoreForm(title, name='', emoji='⭐', points='') {
    this._selectedChoreEmoji = emoji;
    return `<div class="inline-form" id="chore-form">
      <div class="inline-form-title">${title}</div>
      <div class="emoji-picker">${CHORE_EMOJIS.map(e => `<span class="emoji-opt${e===emoji?' selected':''}" onclick="Settings.selectEmoji('chore','${e}')">${e}</span>`).join('')}</div>
      <div class="form-row">
        <div class="form-field" style="flex:2">
          <label>なまえ</label>
          <input class="form-input" id="chore-name-input" type="text" maxlength="15" placeholder="お手伝いの名前" value="${escHtml(name)}">
        </div>
        <div class="form-field" style="flex:1">
          <label>ポイント</label>
          <input class="form-input" id="chore-pts-input" type="number" min="1" max="999" placeholder="pt" value="${points}">
        </div>
      </div>
      <div class="form-error hidden" id="chore-form-error"></div>
      <div class="form-actions">
        <button class="btn btn-ghost btn-sm" onclick="Settings.cancelChoreEdit()">キャンセル</button>
        <button class="btn btn-child btn-sm" onclick="Settings.saveChore()">💾 保存</button>
      </div>
    </div>`;
  },

  _renderRewardForm(title, name='', emoji='⭐', points='') {
    this._selectedRewardEmoji = emoji;
    return `<div class="inline-form" id="reward-form">
      <div class="inline-form-title">${title}</div>
      <div class="emoji-picker">${REWARD_EMOJIS.map(e => `<span class="emoji-opt${e===emoji?' selected':''}" onclick="Settings.selectEmoji('reward','${e}')">${e}</span>`).join('')}</div>
      <div class="form-row">
        <div class="form-field" style="flex:2">
          <label>なまえ</label>
          <input class="form-input" id="reward-name-input" type="text" maxlength="15" placeholder="ご褒美の名前" value="${escHtml(name)}">
        </div>
        <div class="form-field" style="flex:1">
          <label>ポイント</label>
          <input class="form-input" id="reward-pts-input" type="number" min="1" max="9999" placeholder="pt" value="${points}">
        </div>
      </div>
      <div class="form-error hidden" id="reward-form-error"></div>
      <div class="form-actions">
        <button class="btn btn-ghost btn-sm" onclick="Settings.cancelRewardEdit()">キャンセル</button>
        <button class="btn btn-child btn-sm" onclick="Settings.saveReward()">💾 保存</button>
      </div>
    </div>`;
  },

  selectEmoji(type, emoji) {
    if (type === 'chore') {
      this._selectedChoreEmoji = emoji;
      document.querySelectorAll('#chore-form .emoji-opt').forEach(el => {
        el.classList.toggle('selected', el.textContent.trim() === emoji);
      });
    } else {
      this._selectedRewardEmoji = emoji;
      document.querySelectorAll('#reward-form .emoji-opt').forEach(el => {
        el.classList.toggle('selected', el.textContent.trim() === emoji);
      });
    }
  },

  openAddChore() {
    this._choreEditId = null;
    this.cancelRewardEdit();
    const el = document.getElementById('chore-settings-list');
    const form = this._renderChoreForm('➕ おてつだいを追加');
    el.insertAdjacentHTML('beforebegin', form);
    document.getElementById('chore-name-input').focus();
  },

  openEditChore(id) {
    this.cancelChoreEdit();
    this.cancelRewardEdit();
    this._choreEditId = id;
    const c = DataStore.getChores().find(x => x.id === id);
    if (!c) return;
    const item = document.getElementById(`chore-item-${id}`);
    item.insertAdjacentHTML('beforebegin', this._renderChoreForm('✏️ おてつだいを編集', c.name, c.emoji, c.points));
    item.style.display = 'none';
    document.getElementById('chore-name-input').focus();
  },

  saveChore() {
    const name = document.getElementById('chore-name-input').value.trim();
    const pts = parseInt(document.getElementById('chore-pts-input').value);
    const errEl = document.getElementById('chore-form-error');
    if (!name) { errEl.textContent = '名前を入れてね'; errEl.classList.remove('hidden'); return; }
    if (!pts || pts < 1) { errEl.textContent = 'ポイントは1以上にしてね'; errEl.classList.remove('hidden'); return; }
    const emoji = this._selectedChoreEmoji || '⭐';
    if (this._choreEditId) {
      DataStore.updateChore(this._choreEditId, name, emoji, pts);
    } else {
      DataStore.addChore(name, emoji, pts);
    }
    this._choreEditId = null;
    Renderer.renderChoreSettings();
    Renderer.showToast('✅ 保存したよ！');
  },

  cancelChoreEdit() {
    const form = document.getElementById('chore-form');
    if (form) form.remove();
    if (this._choreEditId) {
      const item = document.getElementById(`chore-item-${this._choreEditId}`);
      if (item) item.style.display = '';
      this._choreEditId = null;
    }
  },

  confirmDeleteChore(id) {
    this.cancelChoreEdit();
    const item = document.getElementById(`chore-item-${id}`);
    const existing = document.getElementById(`del-chore-${id}`);
    if (existing) { existing.remove(); return; }
    const c = DataStore.getChores().find(x => x.id === id);
    if (!c) return;
    const html = `<div class="delete-confirm" id="del-chore-${id}">
      <span>「${escHtml(c.name)}」を削除する？</span>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('del-chore-${id}').remove()">やめる</button>
      <button class="btn btn-danger btn-sm" onclick="Settings.executeDeleteChore('${id}')">削除</button>
    </div>`;
    item.insertAdjacentHTML('beforebegin', html);
  },

  executeDeleteChore(id) {
    DataStore.deleteChore(id);
    Renderer.renderChoreSettings();
    Renderer.showToast('🗑️ 削除したよ');
  },

  openAddReward() {

    this.cancelChoreEdit();
    const el = document.getElementById('reward-settings-list');
    const form = this._renderRewardForm('➕ ご褒美を追加');

    this.cancelChoreEdit();

    const r = DataStore.getRewards().find(x => x.id === id);

    const pts = parseInt(document.getElementById('reward-pts-input').value);
    const errEl = document.getElementById('reward-form-error');
    if (!name) { errEl.textContent = '名前を入れてね'; errEl.classList.remove('hidden'); return; }
    if (!pts || pts < 1) { errEl.textContent = 'ポイントは1以上にしてね'; errEl.classList.remove('hidden'); return; }

    if (this._rewardEditId) {
      DataStore.updateReward(this._rewardEditId, name, emoji, pts);
    } else {
      DataStore.addReward(name, emoji, pts);

    Renderer.showToast('✅ 保存したよ！');
  },

  cancelRewardEdit() {
    const form = document.getElementById('reward-form');
    if (form) form.remove();
    if (this._rewardEditId) {
      const item = document.getElementById(`reward-item-${this._rewardEditId}`);
      if (item) item.style.display = '';

  confirmDeleteReward(id) {
    this.cancelRewardEdit();
    const item = document.getElementById(`reward-item-${id}`);
    const existing = document.getElementById(`del-reward-${id}`);
    if (existing) { existing.remove(); return; }
    const r = DataStore.getRewards().find(x => x.id === id);

      <button class="btn btn-danger btn-sm" onclick="Settings.executeDeleteReward('${id}')">削除</button>

    item.insertAdjacentHTML('beforebegin', html);

  executeDeleteReward(id) {

    el.innerHTML = `<div class="delete-confirm">
      <span>⚠️ 全データを削除します。本当に？</span>
      <button class="btn btn-ghost btn-sm" onclick="Settings.cancelReset()">やめる</button>
      <button class="btn btn-danger btn-sm" onclick="Settings.executeReset()">リセット</button>
    </div>`;
  },

  cancelReset() {
    const el = document.getElementById('reset-confirm');
    el.classList.add('hidden');
    el.innerHTML = '';
  },

  executeReset() {
    localStorage.removeItem(STORAGE_KEY);
    Storage._cache = null;
    Storage.load();
    App.goChildSelect();
    Renderer.showToast('🗑️ データをリセットしました');
  },

  async connectFirebase() {
    const raw = document.getElementById('firebase-config-textarea').value.trim();
    const errEl = document.getElementById('firebase-config-error');
    errEl.classList.add('hidden');

    let cfg;
    try {
      // Extract the {...} block from any pasted format:
      // - const firebaseConfig = { ... };
      // - { ... }
      // - just the inner content
      const match = raw.match(/\{[\s\S]*\}/);
      if (!match) throw new Error('no object');
      let jsonStr = match[0]
        .replace(/^\s*\/\/.*$/gm, '')            // remove full-line // comments (not https://)
        .replace(/,\s*\/\/[^\n"]*/g, ',')        // remove inline // comments after commas
        .replace(/,\s*\}/g, '}')                 // remove trailing commas
        .replace(/,\s*\]/g, ']')                 // remove trailing commas in arrays
        .replace(/([{,]\s*)([a-zA-Z_$][\w$]*)(\s*:)/g, '$1"$2"$3') // quote unquoted keys
        .replace(/:\s*'([^']*)'/g, ': "$1"');    // single quotes → double quotes
      cfg = JSON.parse(jsonStr);
    } catch(e) {
      errEl.innerHTML = `解析に失敗しました。<br>
        Firebaseコンソールで表示される <code>const firebaseConfig = { ... }</code> の<br>
        <strong>{ から } まで</strong>をすべてコピーして貼り付けてください。`;
      errEl.classList.remove('hidden');
      return;
    }

    const required = ['apiKey', 'databaseURL', 'projectId'];
    const missing = required.filter(k => !cfg[k]);
    if (missing.length > 0) {
      errEl.textContent = `必須項目がありません: ${missing.join(', ')}。databaseURL は必ず含めてください。`;
      errEl.classList.remove('hidden');
      return;
    }

    FirebaseSync.saveConfig(cfg);
    const ok = await FirebaseSync.init(cfg);
    if (!ok) {
      errEl.textContent = 'Firebase への接続に失敗しました。設定を確認してください。';
      errEl.classList.remove('hidden');
      return;
    }

    // Push current local data to Firebase (first-time setup)
    try {
      const snap = await FirebaseSync._ref.once('value');
      const remoteData = normalizeFirebaseData(snap.val());
      if (remoteData) {
        Storage._cache = remoteData;
        Storage.save(remoteData);
      } else {
        FirebaseSync.push(Storage.getData());
      }
      FirebaseSync._status = 'connected';
      FirebaseSync._updateIndicator();
    } catch(e) {
      FirebaseSync._status = 'error';
      FirebaseSync._updateIndicator();
    }

    // Start real-time listener
    FirebaseSync.listen(data => {
      if (data) {
        Storage._cache = data;
        Storage.save(data);
        Renderer.updateChildSelect();
        App._refreshCurrentTab();
      }
    });

    Renderer.renderSettings();
    Renderer.showToast('☁️ Firebaseに接続しました！');
  },

  disconnectFirebase() {
    FirebaseSync.clearConfig();
    Renderer.renderSettings();
    Renderer.showToast('Firebase接続を解除しました');
  }
};

// ─── App ──────────────────────────────────────────────────────
const App = {
  _activeChild: null,
  _activeTab: 'home',
  _pendingRewardId: null,

  init() {
    try {
      Storage.load();
    } catch(e) {
      // localStorage data is corrupted — wipe and start fresh
      console.warn('Storage corrupted, resetting:', e);
      localStorage.removeItem(STORAGE_KEY);
      Storage._cache = null;
      Storage.load();
    }
    // Show UI immediately — never block on Firebase
    Renderer.updateChildSelect();
    this._showScreen('screen-child-select');
    // Firebase init runs in background
    try {
      const cfg = FirebaseSync.loadConfig();
      if (cfg) this._initFirebase(cfg);
    } catch(e) {
      console.warn('Firebase init failed:', e);
    }
  },

  async _initFirebase(cfg) {
    const ok = await FirebaseSync.init(cfg);
    if (!ok) return;
    try {
      const snap = await FirebaseSync._ref.once('value');
      const remoteData = normalizeFirebaseData(snap.val());
      if (remoteData) {
        Storage._cache = remoteData;
        Storage.save(remoteData);
        Renderer.updateChildSelect();
        this._refreshCurrentTab();
      } else {
        FirebaseSync.push(Storage.getData());
      }
      FirebaseSync._status = 'connected';
      FirebaseSync._updateIndicator();
    } catch(e) {
      FirebaseSync._status = 'error';
      FirebaseSync._updateIndicator();
    }
    // Real-time listener for changes from other devices
    FirebaseSync.listen(data => {
      if (data) {
        Storage._cache = data;
        Storage.save(data);
        Renderer.updateChildSelect();
        this._refreshCurrentTab();
      }
    });
  },

  _refreshCurrentTab() {
    if (!this._activeChild) return;
    const tab = this._activeTab;
    if (tab === 'home') Renderer.renderHome(this._activeChild);
    else if (tab === 'rewards') Renderer.renderRewards(this._activeChild);
    else if (tab === 'stats') Renderer.renderStats(this._activeChild);
    else if (tab === 'settings') Renderer.renderSettings();
    Renderer.updateTopBar(this._activeChild);
  },

  _showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  },

  selectChild(childKey) {
    this._activeChild = childKey;
    this._activeTab = 'home';
    document.body.dataset.child = childKey;
    Renderer.updateTopBar(childKey);
    this._showScreen('screen-main');
    this.showTab('home');
  },

  goChildSelect() {
    this._activeChild = null;
    document.body.removeAttribute('data-child');
    Renderer.updateChildSelect();
    this._showScreen('screen-child-select');
  },

  showTab(tab) {
    this._activeTab = tab;
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
    document.getElementById(`nav-${tab}`).classList.add('active');

    const child = this._activeChild;
    if (tab === 'home') Renderer.renderHome(child);
    else if (tab === 'rewards') Renderer.renderRewards(child);
    else if (tab === 'stats') Renderer.renderStats(child);
    else if (tab === 'settings') Renderer.renderSettings();
  },

  showInnerTab(section, tab) {
    if (section === 'rewards') {
      document.querySelectorAll('.inner-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.inner-pane').forEach(p => p.classList.remove('active'));
      document.getElementById(`rtab-${tab}`).classList.add('active');
      document.getElementById(`rewards-${tab}-pane`).classList.add('active');
    }
  },

  openModal() {
    Renderer.renderChoreGrid();
    document.getElementById('modal-backdrop').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  },

  closeModal(e) {
    document.getElementById('modal-backdrop').classList.add('hidden');
    document.body.style.overflow = '';
  },

  recordChore(choreId) {
    const rec = DataStore.addRecord(this._activeChild, choreId);
    if (rec) {
      this.closeModal();
      Renderer.renderHome(this._activeChild);
      Renderer.showToast(`✅ 「${rec.choreName}」をきろくしたよ！ ＋${rec.points}pt ⭐`);
      // bounce animation on balance number
      const el = document.getElementById('balance-num');
      el.style.animation = 'none';
      el.offsetHeight; // reflow
      el.style.animation = 'pointBounce 0.4s ease';
    }
  },

  confirmReward(rewardId) {
    const reward = DataStore.getRewards().find(r => r.id === rewardId);
    if (!reward) return;
    const balance = DataStore.getBalance(this._activeChild);
    if (balance < reward.points) {
      Renderer.showToast('ポイントが足りないよ！');
      return;
    }
    this._pendingRewardId = rewardId;
    document.getElementById('confirm-emoji').textContent = reward.emoji;
    document.getElementById('confirm-title').textContent = `「${reward.name}」をつかう？`;
    document.getElementById('confirm-sub').textContent = `${reward.points} pt つかうよ（残高: ${balance} pt）`;
    document.getElementById('confirm-ok-btn').onclick = () => this.executeReward();
    document.getElementById('confirm-overlay').classList.remove('hidden');
  },

  closeConfirm() {
    document.getElementById('confirm-overlay').classList.add('hidden');
    this._pendingRewardId = null;
  },

  executeReward() {
    const result = DataStore.addRedemption(this._activeChild, this._pendingRewardId);
    this.closeConfirm();
    if (result.ok) {
      Renderer.renderRewards(this._activeChild);
      Renderer.updateTopBar(this._activeChild);
      Renderer.showToast(`🎁 「${result.redemption.rewardName}」をつかったよ！ −${result.redemption.points}pt`);
    } else {
      Renderer.showToast(`⚠️ ${result.msg}`);
    }
  }
};

// ─── Utilities ────────────────────────────────────────────────
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
