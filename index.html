<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3年生の勉強アプリ</title>
  <style>
    /* === リセット & ベース === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-bg: #fff9f0;
      --c-primary: #ff7043;
      --c-secondary: #42a5f5;
      --c-green: #66bb6a;
      --c-yellow: #ffa726;
      --c-purple: #ab47bc;
      --c-red: #ef5350;
      --c-text: #333;
      --c-muted: #888;
      --radius: 18px;
      --shadow: 0 4px 16px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Hiragino Maru Gothic Pro', 'M PLUS Rounded 1c', sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 16px;
    }

    /* === 共通コンポーネント === */
    .screen {
      display: none;
      width: 100%;
      max-width: 560px;
      animation: fadeIn 0.3s ease;
    }
    .screen.active { display: flex; flex-direction: column; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      0%   { transform: scale(0.8); opacity: 0; }
      70%  { transform: scale(1.05); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-10px); }
    }

    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
    }

    h1.app-title {
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
      margin: 24px 0 8px;
      letter-spacing: 2px;
    }
    .subtitle {
      text-align: center;
      color: var(--c-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 20px;
    }

    /* === ボタン === */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 5px 0 rgba(0,0,0,0.18);
      color: #fff;
      letter-spacing: 1px;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 7px 0 rgba(0,0,0,0.18); }
    .btn:active { transform: translateY(3px);  box-shadow: 0 2px 0 rgba(0,0,0,0.18); }
    .btn + .btn { margin-top: 12px; }

    .btn-orange  { background: var(--c-primary); }
    .btn-blue    { background: var(--c-secondary); }
    .btn-green   { background: var(--c-green); }
    .btn-yellow  { background: var(--c-yellow); color: #333; }
    .btn-purple  { background: var(--c-purple); }
    .btn-red     { background: var(--c-red); }
    .btn-gray    { background: #90a4ae; }
    .btn-outline {
      background: #fff;
      color: var(--c-primary);
      border: 3px solid var(--c-primary);
      box-shadow: 0 4px 0 rgba(255,112,67,0.3);
    }
    .btn-sm {
      padding: 10px 16px;
      font-size: 0.95rem;
      border-radius: 12px;
      width: auto;
    }
    .btn:disabled { opacity: 0.45; cursor: default; transform: none; box-shadow: none; }

    /* === 科目選択 === */
    .subject-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .subject-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 24px;
      border: none;
      border-radius: var(--radius);
      font-size: 1.4rem;
      font-weight: 900;
      cursor: pointer;
      color: #fff;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 5px 0 rgba(0,0,0,0.2);
      text-align: left;
    }
    .subject-btn:hover  { transform: translateY(-3px); }
    .subject-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
    .subject-btn .emoji { font-size: 2rem; }
    .subject-btn .wrong-badge {
      position: absolute;
      right: 18px; top: 50%;
      transform: translateY(-50%);
      background: var(--c-red);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .math-btn   { background: linear-gradient(135deg, #ff7043, #ff5722); }
    .eng-btn    { background: linear-gradient(135deg, #42a5f5, #1e88e5); }
    .kanji-btn  { background: linear-gradient(135deg, #ab47bc, #8e24aa); }

    /* === 難易度選択 === */
    .diff-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    .diff-btn {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 5px 0 rgba(0,0,0,0.18);
    }
    .diff-btn:hover  { transform: translateY(-3px); }
    .diff-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.18); }
    .diff-btn .wrong-badge {
      position: absolute;
      right: 18px; top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.3);
      border: 2px solid rgba(255,255,255,0.6);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .easy-btn   { background: linear-gradient(135deg, #66bb6a, #43a047); }
    .normal-btn { background: linear-gradient(135deg, #ffa726, #fb8c00); }
    .hard-btn   { background: linear-gradient(135deg, #ef5350, #e53935); }

    /* === モード選択 === */
    .mode-cards {
      display: grid;
      gap: 16px;
    }
    .mode-card {
      background: #fff;
      border: 3px solid transparent;
      border-radius: var(--radius);
      padding: 22px;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: var(--shadow);
      text-align: left;
    }
    .mode-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
    .mode-card.normal-mode  { border-color: var(--c-secondary); }
    .mode-card.review-mode  { border-color: var(--c-red); }
    .mode-card.disabled     { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .mode-card-title {
      font-size: 1.3rem;
      font-weight: 900;
      margin-bottom: 6px;
    }
    .mode-card-desc {
      font-size: 0.9rem;
      color: var(--c-muted);
      line-height: 1.5;
    }
    .mode-card-count {
      display: inline-block;
      margin-top: 10px;
      background: var(--c-red);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 800;
      padding: 3px 12px;
      border-radius: 20px;
    }

    /* === 問題画面 === */
    .progress-bar-wrap {
      background: #e0e0e0;
      border-radius: 10px;
      height: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--c-secondary), var(--c-green));
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    .progress-label {
      text-align: right;
      font-size: 0.85rem;
      color: var(--c-muted);
      margin-bottom: 16px;
      font-weight: 700;
    }

    .question-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 28px 22px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .question-text {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      line-height: 1.5;
    }

    .choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .choice-btn {
      padding: 18px 10px;
      border: 3px solid #e0e0e0;
      border-radius: var(--radius);
      background: #fff;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.12s;
      box-shadow: 0 3px 0 #e0e0e0;
      color: var(--c-text);
    }
    .choice-btn:hover:not(:disabled) {
      border-color: var(--c-secondary);
      background: #e3f2fd;
      transform: translateY(-2px);
      box-shadow: 0 5px 0 #90caf9;
    }
    .choice-btn.correct {
      border-color: var(--c-green);
      background: #e8f5e9;
      color: var(--c-green);
      animation: popIn 0.3s ease;
    }
    .choice-btn.wrong {
      border-color: var(--c-red);
      background: #ffebee;
      color: var(--c-red);
      animation: shake 0.4s ease;
    }
    .choice-btn.show-correct {
      border-color: var(--c-green);
      background: #e8f5e9;
      color: var(--c-green);
    }
    .choice-btn:disabled { cursor: default; }

    .feedback-area {
      text-align: center;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .feedback-msg {
      font-size: 1.4rem;
      font-weight: 900;
      animation: popIn 0.3s ease;
    }
    .feedback-correct { color: var(--c-green); }
    .feedback-wrong   { color: var(--c-red); }
    .next-btn-wrap { width: 100%; }

    /* === 結果画面 === */
    .result-score {
      text-align: center;
      padding: 20px 0;
    }
    .score-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--c-secondary), var(--c-green));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 6px 20px rgba(66,165,245,0.4);
      animation: popIn 0.4s ease;
    }
    .score-number {
      font-size: 3.2rem;
      font-weight: 900;
      color: #fff;
      line-height: 1;
    }
    .score-denom {
      font-size: 1rem;
      color: rgba(255,255,255,0.85);
      font-weight: 700;
    }
    .result-message {
      font-size: 1.3rem;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .result-sub {
      font-size: 0.9rem;
      color: var(--c-muted);
      margin-bottom: 20px;
    }
    .wrong-summary {
      background: #fff3e0;
      border: 2px solid var(--c-yellow);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 16px;
      font-size: 0.95rem;
      font-weight: 700;
      color: #e65100;
    }

    /* === ヘッダーナビ === */
    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--c-muted);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 0;
      margin-bottom: 12px;
    }
    .nav-back:hover { color: var(--c-primary); }

    /* === 間違い一覧 === */
    .wrong-list { display: flex; flex-direction: column; gap: 12px; }
    .wrong-item {
      background: #fff;
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 4px solid var(--c-red);
    }
    .wrong-item-q { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .wrong-item-a { font-size: 0.85rem; color: var(--c-green); font-weight: 700; }

    /* === バッジ・タグ === */
    .tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 800;
      margin-right: 6px;
    }
    .tag-math   { background: #ffccbc; color: #bf360c; }
    .tag-eng    { background: #bbdefb; color: #0d47a1; }
    .tag-kanji  { background: #e1bee7; color: #4a148c; }
    .tag-easy   { background: #c8e6c9; color: #1b5e20; }
    .tag-normal { background: #ffe0b2; color: #e65100; }
    .tag-hard   { background: #ffcdd2; color: #b71c1c; }

    /* === ユーティリティ === */
    .mt-8  { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .mt-16 { margin-top: 16px; }
    .text-center { text-align: center; }
    .flex-row { display: flex; gap: 10px; }
    .flex-row .btn { flex: 1; }

    /* === レスポンシブ === */
    @media (max-width: 420px) {
      .question-text { font-size: 1.2rem; }
      .choice-btn { font-size: 1rem; padding: 14px 6px; }
      h1.app-title { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<!-- ===== TOP SCREEN ===== -->
<div id="screen-top" class="screen active">
  <h1 class="app-title">📚 べんきょうアプリ</h1>
  <p class="subtitle">小学3年生むけ　なんの べんきょうをする？</p>
  <div class="subject-grid">
    <button class="subject-btn math-btn" onclick="selectSubject('math')">
      <span class="emoji">🔢</span>
      <span>さんすう</span>
      <span class="wrong-badge" id="badge-math" style="display:none"></span>
    </button>
    <button class="subject-btn eng-btn" onclick="selectSubject('english')">
      <span class="emoji">🔤</span>
      <span>えいご</span>
      <span class="wrong-badge" id="badge-english" style="display:none"></span>
    </button>
    <button class="subject-btn kanji-btn" onclick="selectSubject('kanji')">
      <span class="emoji">✍️</span>
      <span>かんじ</span>
      <span class="wrong-badge" id="badge-kanji" style="display:none"></span>
    </button>
  </div>
</div>

<!-- ===== DIFFICULTY SCREEN ===== -->
<div id="screen-difficulty" class="screen">
  <button class="nav-back" onclick="goTo('top')">← もどる</button>
  <p class="section-title" id="diff-title">むずかしさを えらぼう</p>
  <div class="diff-grid">
    <button class="diff-btn easy-btn" onclick="selectDifficulty('easy')">
      <span style="font-size:1.8rem">⭐</span>
      <span>かんたん</span>
      <span class="wrong-badge" id="badge-easy" style="display:none"></span>
    </button>
    <button class="diff-btn normal-btn" onclick="selectDifficulty('normal')">
      <span style="font-size:1.8rem">⭐⭐</span>
      <span>ふつう</span>
      <span class="wrong-badge" id="badge-normal" style="display:none"></span>
    </button>
    <button class="diff-btn hard-btn" onclick="selectDifficulty('hard')">
      <span style="font-size:1.8rem">⭐⭐⭐</span>
      <span>むずかしい</span>
      <span class="wrong-badge" id="badge-hard" style="display:none"></span>
    </button>
  </div>
</div>

<!-- ===== MODE SCREEN ===== -->
<div id="screen-mode" class="screen">
  <button class="nav-back" onclick="goTo('difficulty')">← もどる</button>
  <p class="section-title" id="mode-title">モードを えらぼう</p>
  <div class="mode-cards">
    <div class="mode-card normal-mode" onclick="startQuiz('normal')">
      <div class="mode-card-title">📝 つうじょうモード</div>
      <div class="mode-card-desc">まちがえた もんだいを ゆうせんして 10もん だすよ！</div>
    </div>
    <div class="mode-card review-mode" id="review-mode-card" onclick="startQuiz('review')">
      <div class="mode-card-title">🔁 ふくしゅうモード</div>
      <div class="mode-card-desc">まちがえた もんだいだけ れんしゅうしよう！</div>
      <span class="mode-card-count" id="review-count-label"></span>
    </div>
  </div>
</div>

<!-- ===== QUIZ SCREEN ===== -->
<div id="screen-quiz" class="screen">
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progress-label">1 / 10</div>
  <div class="question-card">
    <div class="question-text" id="question-text"></div>
  </div>
  <div class="choices-grid" id="choices-grid"></div>
  <div class="feedback-area" id="feedback-area"></div>
</div>

<!-- ===== RESULT SCREEN ===== -->
<div id="screen-result" class="screen">
  <div class="card result-score">
    <div class="score-circle">
      <span class="score-number" id="result-correct">0</span>
      <span class="score-denom" id="result-total">/ 10もん</span>
    </div>
    <div class="result-message" id="result-message"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="wrong-summary" id="result-wrong-summary" style="display:none"></div>
  </div>
  <div class="flex-row mt-8">
    <button class="btn btn-blue" onclick="retryQuiz()">もう一度</button>
    <button class="btn btn-red" id="result-review-btn" onclick="goReviewFromResult()" style="display:none">復習する</button>
  </div>
  <button class="btn btn-outline mt-12" onclick="goTo('top')">科目えらびにもどる</button>
</div>

<script>
// =============================================
// 問題データ
// =============================================
const QUESTIONS = {
  math: {
    easy: [
      { id:"m_e_1",  q:"276 ＋ 354 ＝ ?",              a:"630",   choices:["630","620","640","530"] },
      { id:"m_e_2",  q:"502 － 167 ＝ ?",              a:"335",   choices:["335","325","345","435"] },
      { id:"m_e_3",  q:"1時間30分は何分？",             a:"90分",  choices:["90分","80分","100分","60分"] },

      { id:"m_e_8",  q:"2時間45分は何分？",             a:"165分", choices:["165分","155分","175分","135分"] },

      { id:"m_e_10", q:"800 － 173 ＝ ?",              a:"627",   choices:["627","617","637","727"] },

      { id:"m_e_13", q:"901 － 456 ＝ ?",              a:"445",   choices:["445","435","455","545"] },

      { id:"m_e_15", q:"1kg500gは何g？",               a:"1500g", choices:["1500g","150g","500g","15000g"] },
    ],
    normal: [
      { id:"m_n_1",  q:"23 × 7 ＝ ?",                        a:"161",   choices:["161","151","171","162"] },

      { id:"m_n_8",  q:"56 × 9 ＝ ?",                        a:"504",   choices:["504","494","514","500"] },
      { id:"m_n_9",  q:"328 ÷ 4 ＝ ?",                       a:"82",    choices:["82","80","84","78"] },
      { id:"m_n_10", q:"1個85円のパンを7個買うと何円？",       a:"595円", choices:["595円","585円","605円","490円"] },
      { id:"m_n_11", q:"63 × 6 ＝ ?",                        a:"378",   choices:["378","368","388","374"] },
      { id:"m_n_12", q:"252 ÷ 7 ＝ ?",                       a:"36",    choices:["36","34","38","32"] },

// =============================================
// アプリ状態
// =============================================
let state = {
  subject: null,
  difficulty: null,
  mode: null,          // 'normal' | 'review'
  questions: [],       // 出題する問題リスト
  currentIndex: 0,
  correctCount: 0,
  newWrongIds: [],     // 今回新しく間違えたID
  answeredWrongIds: [], // 今回の問題のうち間違えたID
};

// =============================================
// localStorage管理（インメモリキャッシュ付き）
// =============================================
const STORAGE_KEY = 'studyApp_wrongAnswers';
let _wrongCache = null; // null=未初期化、以後はオブジェクト

function loadWrongAnswers() {
  if (_wrongCache === null) {
    // 初回のみlocalStorageから読み込み、以後はメモリを使う
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      _wrongCache = raw ? JSON.parse(raw) : {};
    } catch {
      _wrongCache = {};
    }
  }
  return _wrongCache;
}

function saveWrongAnswers(data) {
  _wrongCache = data; // メモリに必ず反映（localStorage失敗でも動く）
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function getWrongIds(subject, difficulty) {
  const data = loadWrongAnswers();
  return data[`${subject}_${difficulty}`] || [];
}

function addWrongId(subject, difficulty, id) {
  const data = loadWrongAnswers();
  const key = `${subject}_${difficulty}`;
  if (!data[key]) data[key] = [];
  if (!data[key].includes(id)) data[key].push(id);
  saveWrongAnswers(data);
}

function removeCorrectId(subject, difficulty, id) {
  const data = loadWrongAnswers();
  const key = `${subject}_${difficulty}`;
  if (!data[key]) return;
  data[key] = data[key].filter(x => x !== id);
  saveWrongAnswers(data);
}

function countAllWrong(subject) {
  const data = loadWrongAnswers();
  const diffs = ['easy', 'normal', 'hard'];
  return diffs.reduce((sum, d) => sum + (data[`${subject}_${d}`] || []).length, 0);
}

// =============================================
// 画面遷移
// =============================================
function goTo(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screenId).classList.add('active');
  window.scrollTo(0, 0);
}

// =============================================
// 科目選択
// =============================================
function selectSubject(subject) {
  state.subject = subject;
  // バッジ更新（難易度画面）
  ['easy','normal','hard'].forEach(d => {
    const ids = getWrongIds(subject, d);
    const badge = document.getElementById('badge-' + d);
    if (ids.length > 0) {
      badge.textContent = `まちがい ${ids.length}問`;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  });
  const titles = { math:'さんすう', english:'えいご', kanji:'かんじ' };
  document.getElementById('diff-title').textContent = `【${titles[subject]}】むずかしさを えらぼう`;
  goTo('difficulty');
}

// =============================================
// 難易度選択
// =============================================
function selectDifficulty(difficulty) {
  state.difficulty = difficulty;
  const wrongIds = getWrongIds(state.subject, difficulty);
  const reviewCard = document.getElementById('review-mode-card');
  const reviewLabel = document.getElementById('review-count-label');

  if (wrongIds.length > 0) {
    reviewCard.classList.remove('disabled');
    reviewLabel.textContent = `まちがい ${wrongIds.length}問`;
    reviewLabel.style.display = '';
  } else {
    reviewCard.classList.add('disabled');
    reviewLabel.style.display = 'none';
  }

  const subjectNames = { math:'さんすう', english:'えいご', kanji:'かんじ' };
  const diffNames = { easy:'かんたん', normal:'ふつう', hard:'むずかしい' };
  document.getElementById('mode-title').textContent =
    `【${subjectNames[state.subject]}・${diffNames[difficulty]}】モードを えらぼう`;

  goTo('mode');
}

// =============================================
// 問題選出
// =============================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions(mode) {
  const pool = QUESTIONS[state.subject][state.difficulty];
  const wrongIds = getWrongIds(state.subject, state.difficulty);

  if (mode === 'review') {
    const wrongQuestions = pool.filter(q => wrongIds.includes(q.id));
    return shuffle(wrongQuestions).slice(0, 10);
  }

  // 通常モード: 間違い問題を最大5問 + ランダムで補完
  const wrongQuestions = shuffle(pool.filter(q => wrongIds.includes(q.id))).slice(0, 5);
  const wrongSet = new Set(wrongQuestions.map(q => q.id));
  const others = shuffle(pool.filter(q => !wrongSet.has(q.id)));
  const combined = [...wrongQuestions, ...others].slice(0, 10);
  return shuffle(combined);
}

// =============================================
// クイズ開始
// =============================================
function startQuiz(mode) {
  state.mode = mode;
  state.questions = buildQuestions(mode);
  state.currentIndex = 0;
  state.correctCount = 0;
  state.newWrongIds = [];
  state.answeredWrongIds = [];

  if (state.questions.length === 0) {
    alert('問題がありません。');
    return;
  }

  goTo('quiz');
  renderQuestion();
}

// =============================================
// 問題表示
// =============================================
function renderQuestion() {
  const q = state.questions[state.currentIndex];
  const total = state.questions.length;
  const current = state.currentIndex + 1;

  document.getElementById('progress-fill').style.width = `${(state.currentIndex / total) * 100}%`;
  document.getElementById('progress-label').textContent = `${current} / ${total}もん`;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('feedback-area').innerHTML = '';

  // 選択肢をシャッフル
  const shuffledChoices = shuffle(q.choices);
  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  shuffledChoices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = choice;
    btn.onclick = () => handleAnswer(choice, q);
    grid.appendChild(btn);
  });
}

// =============================================
// 回答処理
// =============================================
function handleAnswer(selected, q) {
  // 全ボタンを無効化
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.textContent === q.a) btn.classList.add('show-correct');
  });

  const isCorrect = selected === q.a;
  const feedbackArea = document.getElementById('feedback-area');

  // クリックしたボタンにスタイル
  document.querySelectorAll('.choice-btn').forEach(btn => {
    if (btn.textContent === selected) {
      btn.classList.add(isCorrect ? 'correct' : 'wrong');
    }
  });

  if (isCorrect) {
    state.correctCount++;
    // 復習モードで正解した場合はwrongリストから削除
    if (state.mode === 'review') {
      removeCorrectId(state.subject, state.difficulty, q.id);
    }
    feedbackArea.innerHTML = `
      <div class="feedback-msg feedback-correct">⭕ せいかい！すごい！</div>
      <div class="next-btn-wrap">
        <button class="btn btn-green btn-sm" onclick="nextQuestion()">つぎへ →</button>
      </div>`;
  } else {
    // UIを先に更新してからlocalStorage操作（例外でボタンが消えないように）
    feedbackArea.innerHTML = `
      <div class="feedback-msg feedback-wrong">❌ まちがい…</div>
      <div style="font-size:0.9rem;color:#555;margin-top:4px;">こたえ：<strong>${q.a}</strong></div>
      <div class="next-btn-wrap" style="margin-top:8px;">
        <button class="btn btn-orange btn-sm" onclick="nextQuestion()">つぎへ →</button>
      </div>`;
    feedbackArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    // 間違い記録
    addWrongId(state.subject, state.difficulty, q.id);
    if (!state.newWrongIds.includes(q.id)) state.newWrongIds.push(q.id);
    if (!state.answeredWrongIds.includes(q.id)) state.answeredWrongIds.push(q.id);
  }
}

// =============================================
// 次の問題へ
// =============================================
function nextQuestion() {
  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// =============================================
// 結果表示
// =============================================
function showResult() {
  const total = state.questions.length;
  const correct = state.correctCount;
  const wrong = total - correct;

  document.getElementById('result-correct').textContent = correct;
  document.getElementById('result-total').textContent = `/ ${total}もん`;

  // メッセージ
  const ratio = correct / total;
  let msg, sub;
  if (ratio === 1)        { msg = '🎉 パーフェクト！さいこう！'; sub = '全問正解！すごい！'; }
  else if (ratio >= 0.8)  { msg = '👏 すごい！よくできました！'; sub = 'あと少しでパーフェクト！'; }
  else if (ratio >= 0.6)  { msg = '😊 よくがんばりました！'; sub = 'まちがえた問題をふくしゅうしよう！'; }
  else if (ratio >= 0.4)  { msg = '💪 もう少し！がんばろう！'; sub = 'ふくしゅうして つぎは もっとできるよ！'; }
  else                     { msg = '📖 ふくしゅうしよう！'; sub = 'まちがえた問題をしっかり覚えよう！'; }

  document.getElementById('result-message').textContent = msg;
  document.getElementById('result-sub').textContent = sub;

  // 間違いサマリー
  const wrongSummary = document.getElementById('result-wrong-summary');
  if (wrong > 0) {
    wrongSummary.style.display = '';
    const totalWrong = getWrongIds(state.subject, state.difficulty).length;
    wrongSummary.innerHTML = `今回まちがえた：<strong>${wrong}問</strong>　 　累計まちがい：<strong>${totalWrong}問</strong>`;
  } else {
    wrongSummary.style.display = 'none';
  }

  // 復習ボタン
  const reviewBtn = document.getElementById('result-review-btn');
  const reviewWrong = getWrongIds(state.subject, state.difficulty);
  if (reviewWrong.length > 0) {
    reviewBtn.style.display = '';
    reviewBtn.textContent = `🔁 ふくしゅう (${reviewWrong.length}問)`;
  } else {
    reviewBtn.style.display = 'none';
  }

  // スコア円のグラデーション更新
  const circle = document.querySelector('.score-circle');
  if (ratio === 1)       circle.style.background = 'linear-gradient(135deg,#ffd700,#ff9800)';
  else if (ratio >= 0.8) circle.style.background = 'linear-gradient(135deg,#66bb6a,#43a047)';
  else if (ratio >= 0.6) circle.style.background = 'linear-gradient(135deg,#42a5f5,#1e88e5)';
  else                   circle.style.background = 'linear-gradient(135deg,#ef5350,#e53935)';

  goTo('result');
}

// =============================================
// ナビゲーション
// =============================================
function retryQuiz() {
  startQuiz(state.mode);
}

function goReviewFromResult() {
  state.mode = 'review';
  startQuiz('review');
}

// =============================================
// トップ画面のバッジ更新
// =============================================
function updateTopBadges() {
  ['math','english','kanji'].forEach(subject => {
    const count = countAllWrong(subject);
    const badge = document.getElementById('badge-' + subject);
    if (count > 0) {
      badge.textContent = `まちがい ${count}問`;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  });
}

// 初期化
updateTopBadges();

// goTo をオーバーライドしてトップ画面ではバッジを更新
const _origGoTo = goTo;
window.goTo = function(screenId) {
  if (screenId === 'top') updateTopBadges();
  _origGoTo(screenId);
};
</script>
